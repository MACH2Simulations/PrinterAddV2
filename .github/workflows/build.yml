name: build

on:
  push:
  pull_request:
    branches: [ main ]
    paths:
    - '**.cs'
    - '**.csproj'

env:
  DOTNET_VERSION: '10.0.x' # The .NET SDK version to use

jobs:
  build:

    name: build-${{matrix.os}}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]

    steps:
    
    - uses: actions/checkout@v3
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Install dependencies
      run: dotnet restore
    - name: Build
      run: dotnet publish -r win-x64 -p:PublishSingleFile=true --self-contained true 
    - name: Uploading artifacts
      uses: actions/upload-artifact@v4
      id: artifact-upload-step
      with:
        name: PrinterAddV2
        path: bin/Release/net10.0-windows10.0.26100.0/win-x64/publish
        overwrite: true
        if-no-files-found: error
    - name: Output artifact ID
      run:  echo 'Artifact ID is ${{ steps.artifact-upload-step.outputs.artifact-id }}'
    - name: Bump version and push tag
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.2
      with:
         github_token: ${{ secrets.GITHUB_TOKEN }}   

    - name: Make output DIR
      run: mkdir out
    - name: Rename And Copy EXE
      run: mv bin\Release\net10.0-windows10.0.26100.0\win-x64\publish\PrinterAddV2.exe out/PrinterAddV2_${{ steps.tag_version.outputs.new_tag }}.exe
    - name: Azure login
      uses: azure/login@v1
      with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: Sign files with Artifact Signing
      uses: azure/artifact-signing-action@v1
      with:
          endpoint: https://weu.codesigning.azure.net/
          signing-account-name: m2s-signing
          certificate-profile-name: M2SPrimary
          files-folder: out/
          files-folder-filter: exe,dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256      

    - name: Zip Files
      uses: vimtor/action-zip@v1.2
      with:
         files: out/PrinterAddV2_${{ steps.tag_version.outputs.new_tag }}.exe
         dest: out/PrinterAddV2_${{ steps.tag_version.outputs.new_tag }}.zip
       
    - name: Release
      uses: softprops/action-gh-release@v2
      #if: startsWith(github.ref, 'refs/tags/')
      with:
    # Identify if this is a pre release by checking if the tag name contains -rc, -b, -a
        #prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-b') || contains(github.ref, '-a') }}
        files: out/*
        tag_name: ${{ steps.tag_version.outputs.new_tag }}
        name: Release ${{ steps.tag_version.outputs.new_tag }}
        body: ${{ steps.tag_version.outputs.changelog }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
